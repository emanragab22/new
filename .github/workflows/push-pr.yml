on:
  push:
    branches:
      - main
      - "release/**"
  paths:
      - "src/**"
  pull_requests:
    branches:
      - main
      - "release/**"    
jobs:
   test:
      runs-on: ubuntu-latest
      steps:
        - name: checkout-repo
          uses: actions/checkout@v6.0.2
        - name: run-tests
          run: npm test
        
